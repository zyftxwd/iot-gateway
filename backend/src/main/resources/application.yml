server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/iiot_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 12
    validate-on-migrate: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    map-underscore-to-camel-case: true

industrial:
  auth:
    token-secret: ${IIOT_AUTH_TOKEN_SECRET:}
    token-ttl-minutes: ${IIOT_AUTH_TOKEN_TTL_MINUTES:480}
    max-login-failures: ${IIOT_AUTH_MAX_LOGIN_FAILURES:5}
    lock-minutes: ${IIOT_AUTH_LOCK_MINUTES:10}
  modbus:
    slave-ip: ${IIOT_MODBUS_SLAVE_IP:127.0.0.1}
    port: ${IIOT_MODBUS_PORT:502}
  collector:
    node-id: ${IIOT_COLLECTOR_NODE_ID:local-dev}
    dispatch-rate-ms: ${IIOT_COLLECTOR_DISPATCH_RATE_MS:1000}
    pool-size: ${IIOT_COLLECTOR_POOL_SIZE:8}
    queue-capacity: ${IIOT_COLLECTOR_QUEUE_CAPACITY:2000}
